<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三田和食酒場 やすらぎ アンケートフォーム</title>
    <style>
        /* 全局基础设置与居中背景 */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 表单容器：卡片化设计 */
        #surveyForm {
            background: #ffffff;
            width: 100%;
            max-width: 500px; /* 限制最大宽度，电脑端不会拉伸太难看 */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 25px;
            color: #2c3e50;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px;
        }

        /* 表单每项的间距 */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group p {
            font-size: 15px;
            font-weight: bold;
            margin: 0 0 10px 0;
            color: #4a5568;
        }

        /* 必填标签美化 */
        .required::after {
            content: "必須";
            background-color: #ff4f19;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            padding: 3px 8px;
            margin-left: 8px;
            border-radius: 4px;
            display: inline-block;
            vertical-align: text-bottom;
            line-height: 1;
        }

        /* 下拉菜单和输入框美化 */
        select, textarea {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            background-color: #fbfbfc;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            font-family: inherit;
            color: #2d3748;
        }

        /* 自定义下拉菜单箭头，覆盖原生丑陋的样式 */
        select {
            appearance: none; 
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a0aec0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }

        /* 获取焦点时的发光效果 */
        select:focus, textarea:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
            background-color: #fff;
        }

        textarea {
            min-height: 120px;
            resize: vertical; /* 允许纵向拉伸，禁止横向 */
        }

        /* 错误提示样式优化 */
        .error {
            background-color: #fff5f5 !important;
            border-color: #fc8181 !important;
        }

        /* 提交按钮美化 */
        #submitBtn {
            width: 100%;
            background-color: #ff4f19; /* 颜色呼应 required 标签 */
            color: #fff;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        #submitBtn:hover {
            background-color: #e03c05;
        }

        #submitBtn:active {
            transform: scale(0.98);
        }

        #submitBtn:disabled {
            background-color: #cbd5e0;
            cursor: not-allowed;
            color: #718096;
        }
    </style>
</head>
<body>
    <form id="surveyForm">
        <h2>三田和食酒場 やすらぎへのご意見をお聞かせください</h2>
        
        <div class="form-group">
            <p class="required">Q.性別を教えてください</p>
            <select name="性別" class="error" required>
                <option value="" selected>----</option>
                <option value="男性">男性</option>
                <option value="女性">女性</option>
                <option value="回答しない">回答しない</option>
            </select>
        </div>
        
        <div class="form-group">
            <p class="required">Q.本日はどなたとご利用されましたか？</p>
            <select name="利用シーン" class="error" required>
                <option value="" selected>----</option>
                <option value="友達と">友達と</option>
                <option value="恋人と">恋人と</option>
                <option value="家族と">家族と</option>
                <option value="会社の仲間と">会社の仲間と</option>
                <option value="一人で">一人で</option>
                <option value="その他">その他</option>
            </select>
        </div>
        
        <div class="form-group">
            <p class="required">Q.当店を何で知りましたか？</p>
            <select name="来店きっかけ" class="error" required>
                <option value="" selected>----</option>
                <option value="google">Google</option>
                <option value="Yahoo!">Yahoo!</option>
                <option value="SNS">SNS</option>
                <option value="マップ">マップ</option>
                <option value="通りがかり">通りがかり</option>
                <option value="チラシ・はがき">チラシ・はがき</option>
                <option value="ポータルサイト">ポータルサイト</option>
                <option value="家族/知人">家族/知人からの紹介</option>
                <option value="その他">その他</option>
            </select>
        </div>
        
        <div class="form-group">
            <p class="required">Q.お料理はいかがでしたか？</p>
            <select name="料理" class="error" required>
                <option value="" selected>----</option>
                <option value="5">5（とても満足）</option>
                <option value="4">4（満足）</option>
                <option value="3">3（普通）</option>
                <option value="2">2（やや不満）</option>
                <option value="1">1（不満）</option>
            </select>
        </div>
        
        <div class="form-group">
            <p class="required">Q.スタッフの接客はいかがでしたか？</p>
            <select name="接客" class="error" required>
                <option value="" selected>----</option>
                <option value="5">5（とても良かった）</option>
                <option value="4">4（良かった）</option>
                <option value="3">3（普通だった）</option>
                <option value="2">2（悪かった）</option>
                <option value="1">1（とても悪かった）</option>
            </select>
        </div>
        
        <div class="form-group">
            <p>Q.その他、何かございましたらお聞かせください</p>
            <textarea name="ご意見" placeholder="ご自由にご記入ください..."></textarea>
        </div>
        
        <input type="submit" id="submitBtn" value="送信">
    </form>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var requiredFields = document.querySelectorAll('[required]');
            // 实时清除错误红色背景
            requiredFields.forEach(function(field) {
                field.addEventListener('input', function() {
                    if (field.value.trim() !== "") {
                        field.classList.remove('error');
                    } else {
                        field.classList.add('error');
                    }
                });
            });
        });

        document.getElementById('surveyForm').addEventListener('submit', async function(event) {
            // 阻止表单的默认跳转行为
            event.preventDefault();

            var requiredFields = document.querySelectorAll('[required]');
            var isValid = true;
            
            // 校验必填项
            requiredFields.forEach(function(field) {
                if (!field.value.trim()) {
                    field.classList.add('error');
                    isValid = false;
                } else {
                    field.classList.remove('error');
                }
            });

            if (!isValid) {
                alert('必須項目を全て入力してください。');
                return;
            }

            // 获取反馈 ID 和 Ref 参数 (复用你的逻辑)
            const qs = new URLSearchParams(location.search);
            const ref = (qs.get("ref") || sessionStorage.getItem("feedback_ref") || "").slice(0, 100);
            const feedbackId = (sessionStorage.getItem("feedback_id") || "").slice(0, 100);

            if (!feedbackId) {
                alert("受付IDが見つかりません。最初の評価ページから送信してください。");
                return;
            }

            // 防抖：禁用按钮
            const submitBtn = document.getElementById("submitBtn");
            const originalBtnText = submitBtn.value;
            submitBtn.disabled = true;
            submitBtn.value = "送信中...";

            // 将表单数据组装成你的 API 需要的格式
            const formElements = event.target.elements;
            const tags = [
                "性別:" + formElements["性別"].value,
                "利用シーン:" + formElements["利用シーン"].value,
                "来店きっかけ:" + formElements["来店きっかけ"].value,
                "料理:" + formElements["料理"].value,
                "接客:" + formElements["接客"].value
            ];
            const detail = formElements["ご意見"].value.trim().slice(0, 2000);
            
            const payload = {
                id: feedbackId,
                tags: tags,
                detail: detail,
                contact: "", // 日文表单没提供联系方式，留空
                ref: ref || undefined
            };

            // 发送到你的后端
            try {
                const res = await fetch("/api/feedback_detail", {
                    method: "POST",
                    headers: { "content-type": "application/json" },
                    body: JSON.stringify(payload)
                });

                let data = null;
                try { data = await res.json(); } catch (e) {}

                if (!res.ok || !data || !data.ok) {
                    alert((data && data.error) ? ("送信失敗: " + data.error) : ("送信失敗: HTTP " + res.status));
                    submitBtn.disabled = false;
                    submitBtn.value = originalBtnText;
                    return;
                }

                alert('送信成功！');
                
                // 提交成功后的动作，比如重定向，你可以自己改
                location.href = "/thanks.html" + (ref ? ("?ref=" + encodeURIComponent(ref)) : "");

            } catch (e) {
                alert("ネットワークエラー、またはインターフェースが利用できません。後でもう一度お試しください。");
                submitBtn.disabled = false;
                submitBtn.value = originalBtnText;
            }
        });
    </script>
</body>
</html>
