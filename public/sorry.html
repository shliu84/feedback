<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>问题反馈</title>
  <style>
    :root { --bg:#f7f7f8; --card:#ffffff; --text:#111827; --muted:#6b7280; --border:#e5e7eb; --btn:#111827; --btnText:#ffffff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    h1 { margin: 0 0 8px; font-size: 20px; line-height: 1.3; }
    p { margin: 0 0 16px; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .row { margin-top: 14px; }
    label { display:block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    textarea, input { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none; background: #fff; }
    textarea { min-height: 120px; resize: vertical; }
    textarea:focus, input:focus { border-color: #c7cbd1; }
    .chips { display:flex; flex-wrap: wrap; gap:8px; }
    .chip { border: 1px solid var(--border); background: #fff; border-radius: 999px; padding: 6px 10px; font-size: 13px; cursor: pointer; }
    .chip.on { border-color: #111827; }
    .actions { margin-top: 18px; display:flex; gap:10px; align-items:center; }
    button.primary { border:0; background: var(--btn); color: var(--btnText); padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 14px; }
    button.primary:disabled { opacity: .55; cursor: not-allowed; }
    button.secondary { border: 1px solid var(--border); background: #fff; color: var(--text); padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 14px; }
    .err { margin-top: 12px; font-size: 13px; color: #b91c1c; display:none; }
    .ok { margin-top: 12px; font-size: 13px; color: #065f46; display:none; }
    .topbar { display:flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .badge { font-size: 12px; color: var(--muted); border: 1px solid var(--border); padding: 4px 8px; border-radius: 999px; background: #fff; }
    .small { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="badge" id="refBadge">ref: -</div>
      <div class="small" id="idText"></div>
    </div>

    <div class="card">
      <h1>问题反馈</h1>
      <p>请补充具体问题。此页面用于内部改进，不会公开展示。</p>

      <div class="row">
        <label>问题类型（可多选）</label>
        <div class="chips" id="chips">
          <button class="chip" type="button" data-v="服务态度">服务态度</button>
          <button class="chip" type="button" data-v="等待时间">等待时间</button>
          <button class="chip" type="button" data-v="品质/内容">品质/内容</button>
          <button class="chip" type="button" data-v="价格">价格</button>
          <button class="chip" type="button" data-v="环境">环境</button>
          <button class="chip" type="button" data-v="其他">其他</button>
        </div>
      </div>

      <div class="row">
        <label for="detail">详细说明（建议填写）</label>
        <textarea id="detail" maxlength="2000" placeholder="请描述发生了什么，以及希望如何改进（最多2000字）"></textarea>
      </div>

      <div class="row">
        <label for="contact">联系方式（可选）</label>
        <input id="contact" maxlength="200" placeholder="邮箱/电话/微信号（可选）" />
      </div>

      <div class="actions">
        <button class="primary" id="sendBtn" type="button">提交反馈</button>
        <button class="secondary" id="backBtn" type="button">返回评分页</button>
      </div>

      <div class="err" id="errBox"></div>
      <div class="ok" id="okBox"></div>

      <div class="small" style="margin-top:14px;">
        说明：该页面可直接展示，也可在提交成功后再跳转到 /thanks.html。
      </div>
    </div>
  </div>

  <script>
    (function () {
      const qs = new URLSearchParams(location.search);
      const ref = (qs.get("ref") || sessionStorage.getItem("feedback_ref") || "").slice(0, 100);
      const feedbackId = (sessionStorage.getItem("feedback_id") || "").slice(0, 100);

      document.getElementById("refBadge").textContent = "ref: " + (ref || "-");
      document.getElementById("idText").textContent = feedbackId ? ("id: " + feedbackId) : "id: -";

      const chipsWrap = document.getElementById("chips");
      const detailEl = document.getElementById("detail");
      const contactEl = document.getElementById("contact");
      const sendBtn = document.getElementById("sendBtn");
      const backBtn = document.getElementById("backBtn");
      const errBox = document.getElementById("errBox");
      const okBox = document.getElementById("okBox");

      let busy = false;
      const selected = new Set();

      function setError(msg) {
        errBox.style.display = msg ? "block" : "none";
        errBox.textContent = msg || "";
      }
      function setOk(msg) {
        okBox.style.display = msg ? "block" : "none";
        okBox.textContent = msg || "";
      }
      function setBusy(v) {
        busy = v;
        sendBtn.disabled = v;
        sendBtn.textContent = v ? "提交中..." : "提交反馈";
      }

      chipsWrap.addEventListener("click", (e) => {
        const btn = e.target.closest(".chip");
        if (!btn) return;
        const v = String(btn.dataset.v || "");
        if (!v) return;
        if (selected.has(v)) selected.delete(v); else selected.add(v);
        btn.classList.toggle("on", selected.has(v));
      });

      backBtn.addEventListener("click", () => {
        location.href = "/index.html" + (ref ? ("?ref=" + encodeURIComponent(ref)) : "");
      });

      // 可选接口：/api/feedback_detail
      // 请求 JSON：{ id, tags:[], detail, contact }
      sendBtn.addEventListener("click", async () => {
        if (busy) return;

        setError("");
        setOk("");

        const detail = (detailEl.value || "").trim().slice(0, 2000);
        const contact = (contactEl.value || "").trim().slice(0, 200);
        const tags = Array.from(selected).slice(0, 10);

        if (!feedbackId) {
          setError("缺少 feedback_id。请从评分页正常提交后进入此页面。");
          return;
        }
        if (!detail && tags.length === 0) {
          setError("请至少选择问题类型或填写详细说明。");
          return;
        }

        setBusy(true);
        try {
          const res = await fetch("/api/feedback_detail", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ id: feedbackId, tags, detail, contact, ref: ref || undefined })
          });

          let data = null;
          try { data = await res.json(); } catch (e) {}

          if (!res.ok || !data || !data.ok) {
            const msg = (data && data.error) ? ("提交失败: " + data.error) : ("提交失败: HTTP " + res.status);
            setError(msg);
            setBusy(false);
            return;
          }

          setOk("提交成功。");
          setBusy(false);

          // 可选：提交成功后跳转
          // location.href = "/thanks.html" + (ref ? ("?ref=" + encodeURIComponent(ref)) : "");
        } catch (e) {
          setError("网络错误或接口不可用。请稍后重试。");
          setBusy(false);
        }
      });
    })();
  </script>
</body>
</html>
